<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Counter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Counter using HTML</h1>

      <p id="countText">Your Current Count is : 0</p>

      <hr />

      <p id="error">Error : Cannot go below 0</p>

      <div class="buttons">
        <button id="decrementBtn" class="btn light">Decrement</button>
        <button id="incrementBtn" class="btn light">Increment</button>
        <button id="clearBtn" class="btn dark">Clear</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
